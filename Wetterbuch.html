<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wetterbuch — C64 Weather Archive Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #0e1117;
  --surface:  #161b26;
  --surface2: #1e2535;
  --border:   #2d3448;
  --accent:   #4f8ef7;
  --text:     #dde3f0;
  --muted:    #7a849e;
  --blue:     #60a5fa;
  --red:      #f87171;
  --green:    #34d399;
  --snow:     #93c5fd;
  --sun:      #fbbf24;
}

body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  font-size: 14px;
}

/* ── Header ── */
header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 10px 18px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
header h1 { font-size: 1rem; font-weight: 700; letter-spacing: .04em; white-space: nowrap; }
.header-sub { font-size: .72rem; color: var(--muted); }
.nav-arrows { display: flex; gap: 6px; margin-left: auto; }
.nav-arrows button, .hdr-btn {
  padding: 5px 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 5px;
  color: var(--text);
  cursor: pointer;
  font-size: .8rem;
  white-space: nowrap;
}
.nav-arrows button:hover, .hdr-btn:hover { border-color: var(--accent); color: var(--accent); }
.hdr-load {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
  font-weight: 600;
}
.hdr-load:hover { background: #3a79e0; border-color: #3a79e0; color: #fff; }
#locationLabel { font-size: .78rem; color: var(--muted); max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ── Layout ── */
.layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── Sidebar ── */
.sidebar {
  width: 170px;
  min-width: 150px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 10px 6px;
  flex-shrink: 0;
}
.year-item { margin-bottom: 2px; }
.year-header { display: flex; gap: 6px; align-items: center; }
.year-toggle {
  background: none;
  border: none;
  color: var(--accent);
  cursor: pointer;
  font-size: 0.85rem;
  padding: 5px 3px;
  width: 18px;
  text-align: center;
  line-height: 1;
  flex-shrink: 0;
}
.year-toggle:hover { opacity: 0.7; }
.year-btn {
  flex: 1;
  text-align: left;
  padding: 5px 8px;
  background: none;
  border: none;
  color: var(--muted);
  font-weight: 700;
  font-size: .82rem;
  cursor: pointer;
  border-radius: 5px;
  letter-spacing: .04em;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.year-btn:hover  { background: var(--surface2); color: var(--text); }
.year-btn.active { background: var(--surface2); color: var(--accent); }
.months-wrap { 
  padding-left: 6px;
  max-height: 500px;
  overflow: hidden;
  transition: max-height 0.3s ease, opacity 0.3s ease;
  opacity: 1;
}
.months-wrap.collapsed { 
  max-height: 0;
  opacity: 0;
}
.month-btn {
  width: 100%;
  text-align: left;
  padding: 3px 8px;
  background: none;
  border: none;
  color: var(--muted);
  font-size: .78rem;
  cursor: pointer;
  border-radius: 4px;
}
.month-btn:hover { background: var(--surface2); color: var(--text); }
.month-btn.active { background: var(--accent); color: #fff; font-weight: 600; }

/* ── Content ── */
.content {
  flex: 1;
  overflow-y: auto;
  padding: 18px 22px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

/* ── Drop zone ── */
#dropZone {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 320px;
  gap: 14px;
  border: 2px dashed var(--border);
  border-radius: 14px;
  color: var(--muted);
  text-align: center;
  transition: border-color .2s, background .2s;
  cursor: pointer;
  padding: 40px;
}
#dropZone.show {
  display: flex;
}
#dropZone.drag-over { border-color: var(--accent); background: rgba(79,142,247,.05); }
#dropZone h2 { font-size: 1.1rem; color: var(--text); }
#dropZone p  { font-size: .82rem; line-height: 1.6; }
.load-options { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 6px; }
.load-options label {
  padding: 9px 18px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  font-size: .82rem;
  transition: border-color .2s;
}
.load-options label:hover { border-color: var(--accent); color: var(--accent); }
.load-options input { display: none; }

/* ── View header ── */
.view-title {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin-bottom: 16px;
}
.view-title h2 { font-size: 1.15rem; font-weight: 700; }
.view-title span { font-size: .82rem; color: var(--muted); }
.tab-row { display: flex; gap: 6px; margin-bottom: 18px; }
.tab-btn {
  padding: 5px 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 5px;
  color: var(--muted);
  cursor: pointer;
  font-size: .8rem;
}
.tab-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
.tab-btn:hover:not(.active) { border-color: var(--accent); color: var(--text); }

/* ── Stat cards ── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
  gap: 10px;
  margin-bottom: 18px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
}
.stat-card .lbl { font-size: .68rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
.stat-card .val { font-size: 1.5rem; font-weight: 700; margin: 2px 0; line-height: 1; }
.stat-card .sub { font-size: .7rem; color: var(--muted); }
.val.blue  { color: var(--blue);  }
.val.red   { color: var(--red);   }
.val.green { color: var(--green); }
.val.snow  { color: var(--snow);  }

/* ── Chart cards ── */
.charts-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-bottom: 18px;
}
.chart-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
}
.chart-card.wide { grid-column: 1 / -1; }
.chart-card h3 {
  font-size: .72rem;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .07em;
  margin-bottom: 10px;
}
.chart-card canvas { max-height: 200px; }
.chart-card.wide canvas { max-height: 230px; }

/* ── Data table ── */
.table-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: auto;
}
table { width: 100%; border-collapse: collapse; font-size: .78rem; }
thead th {
  padding: 8px 10px;
  border-bottom: 2px solid var(--border);
  color: var(--muted);
  font-weight: 600;
  text-transform: uppercase;
  font-size: .68rem;
  letter-spacing: .06em;
  text-align: left;
  white-space: nowrap;
  position: sticky;
  top: 0;
  background: var(--surface);
}
tbody td { padding: 5px 10px; border-bottom: 1px solid var(--border); }
tbody tr:hover td { background: var(--surface2); }
.t-min { color: var(--blue); font-weight: 600; }
.t-max { color: var(--red);  font-weight: 600; }
.w-tags { display: flex; gap: 3px; flex-wrap: wrap; }
.w-tag  { font-size: .68rem; padding: 2px 6px; border-radius: 4px; border: 1.5px solid; background: transparent; color: var(--muted); }
</style>
</head>

<script>
// Embedded weather data for all 168 files (1985-1998)
// Generated by embed_data.py
// Insert embedded_data.js content here
</script>

<header>
  <h1>⛅ Wetterbuch</h1>
  <span class="header-sub">C64 Weather Archive Viewer</span>
  <span id="locationLabel"></span>
  <div class="nav-arrows">
    <button id="btnPrev" onclick="navigate(-1)" title="Vorheriger Monat">◀</button>
    <button id="btnNext" onclick="navigate(+1)" title="Nächster Monat">▶</button>
    <label class="hdr-btn hdr-load" title="Ordner mit Jahresdaten wählen">
      📂 Daten laden
      <input type="file" id="filePicker" multiple onchange="loadFiles(this.files)">
    </label>
  </div>
</header>

<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="content" id="content">
    <div id="dropZone">
      <h2>Wetterbuch — Datenarchiv</h2>
      <p>Wähle den Ordner mit den Jahresdaten (1985–1998)<br>
         oder einzelne <code>.SEQ</code>-Dateien.</p>
      <div class="load-options">
        <label title="Ganzen Ordner laden">
          📁 Ordner wählen
          <input type="file" webkitdirectory multiple onchange="loadFiles(this.files)">
        </label>
        <label title="Einzelne Dateien laden">
          📄 Dateien wählen
          <input type="file" multiple accept=".SEQ,.seq" onchange="loadFiles(this.files)">
        </label>
      </div>
    </div>
  </main>
</div>

<script>
console.log('Script loaded');
// ═══════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════
const MONTHS_DE    = ['Januar','Februar','März','April','Mai','Juni',
                      'Juli','August','September','Oktober','November','Dezember'];
const MONTHS_SHORT = ['Jan','Feb','Mär','Apr','Mai','Jun',
                      'Jul','Aug','Sep','Okt','Nov','Dez'];

const WEATHER = [
  { label:'Sonnig',   icon:'☀',  color:'#f59e0b' },
  { label:'Heiter',   icon:'⛅',  color:'#fbbf24' },
  { label:'Bewölkt',  icon:'☁',  color:'#60a5fa' },
  { label:'Regen',    icon:'🌧', color:'#0369a1' },
  { label:'Gewitter', icon:'⚡', color:'#1e3a8a' },
  { label:'Hagel',    icon:'🌨', color:'#d1d5db' },
  { label:'Schnee',   icon:'❄',  color:'#cffafe' },
  { label:'Nebel',    icon:'🌫', color:'#9ca3af' },
];

const MONTH_PREFIXES = [
  ['JANUAR',9],['FEBRUAR',8],['MAERZ',6],['APRIL',5],
  ['MAI',4],['JUNI',5],['JULI',5],['AUGUST',7],
  ['SEPTEMBE',9],['OKTOBER',8],['NOVEMBER',9],['DEZEMBER',9]
].map(([p], i) => [p, i]);  // use index for month number

// ═══════════════════════════════════════════════════════
// DATA STORE
// ═══════════════════════════════════════════════════════
// db[year][monthIdx (0-11)] = { days: [...], summary: {...} }
const db = {};
let curYear = null, curMonth = null;  // null month = annual view
const charts = {};

// ═══════════════════════════════════════════════════════
// PARSING & DATA LOADING
// ═══════════════════════════════════════════════════════

function detectMonth(filename) {
  const up = filename.toUpperCase();
  for (const [prefix, idx] of MONTH_PREFIXES) {
    if (up.startsWith(prefix)) return idx;
  }
  return -1;
}

function detectYear(path) {
  const m = path.match(/[\/\\]?(\d{4})[\/\\]/);
  if (m) return parseInt(m[1]);
  // Fallback: try from filename (e.g., "JANUAR1985.SEQ")
  const m2 = path.match(/(\d{4})/);
  if (m2) return parseInt(m2[1]);
  // Last resort: ask user
  const yr = prompt('Welches Jahr? (1985-1998)', new Date().getFullYear());
  return yr ? parseInt(yr) : null;
}

// ═══════════════════════════════════════════════════════
// PARSING
// ═══════════════════════════════════════════════════════
function parseSeqFile(buffer) {
  const text = new TextDecoder('latin1').decode(buffer);
  // C64 PRINT# separates values with CR (0x0D); positive numbers have a leading space
  const parts = text.split('\r').map(s => s.trim()).filter(s => s !== '');
  if (parts.length < 16) return null;

  const summaryRaw = parts.slice(-16).map(Number);
  const dayRaw     = parts.slice(0, -16).map(Number);

  const days = [];
  for (let i = 0; i + 4 < dayRaw.length; i += 5) {
    days.push({
      minTemp: dayRaw[i],
      maxTemp: dayRaw[i+1],
      weather: dayRaw[i+2],
      rain:    dayRaw[i+3],
      snow:    dayRaw[i+4],
    });
  }

  // Recompute summary from daily data if all zeros (incomplete save)
  let sum = summaryRaw;
  if (sum.slice(0,8).every(v => v === 0) && days.length > 0) {
    sum = computeSummary(days);
  }

  return {
    days,
    summary: {
      maxTemp: sum[0], maxTempDay: sum[1],
      minTemp: sum[2], minTempDay: sum[3],
      maxRain: sum[4], maxRainDay: sum[5],
      maxSnow: sum[6], maxSnowDay: sum[7],
      weatherCounts: sum.slice(8, 16),
    }
  };
}

function computeSummary(days) {
  let maxT=-999, maxD=0, minT=999, minD=0, maxR=0, maxRD=0, maxS=0, maxSD=0;
  const wc = [0,0,0,0,0,0,0,0];
  days.forEach((d, i) => {
    if (d.maxTemp > maxT) { maxT=d.maxTemp; maxD=i+1; }
    if (d.minTemp < minT) { minT=d.minTemp; minD=i+1; }
    if (d.rain    > maxR) { maxR=d.rain;    maxRD=i+1; }
    if (d.snow    > maxS) { maxS=d.snow;    maxSD=i+1; }
    for (let b=0; b<8; b++) if (d.weather & (1<<b)) wc[b]++;
  });
  return [maxT, maxD, minT, minD, maxR, maxRD, maxS, maxSD, ...wc];
}

// ═══════════════════════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════════════════════
function buildSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = '';
  const years = Object.keys(db).map(Number).sort((a,b)=>a-b);
  for (const year of years) {
    const months = Object.keys(db[year]).map(Number).sort((a,b)=>a-b);
    const isCollapsed = year !== years[0]; // Only expand the first year (1985)
    const item = document.createElement('div');
    item.className = 'year-item';
    item.innerHTML = `
      <div class="year-header">
        <button class="year-toggle" id="toggle${year}" onclick="toggleYear(${year})" title="Expand/Collapse">${isCollapsed ? '▶' : '▼'}</button>
        <button class="year-btn" id="yr${year}" onclick="showAnnual(${year})">
          ${year} <span style="font-weight:400;color:var(--muted)">${months.length}</span>
        </button>
      </div>
      <div class="months-wrap${isCollapsed ? ' collapsed' : ''}" id="mo${year}">
        ${months.map(m => `<button class="month-btn" id="mb${year}_${m}"
            onclick="showMonth(${year},${m})">${MONTHS_SHORT[m]}</button>`).join('')}
      </div>`;
    sidebar.appendChild(item);
  }
}

function toggleYear(year) {
  const monthsWrap = document.getElementById(`mo${year}`);
  const toggle = document.getElementById(`toggle${year}`);
  monthsWrap.classList.toggle('collapsed');
  toggle.textContent = monthsWrap.classList.contains('collapsed') ? '▶' : '▼';
}

function setActive(year, month) {
  document.querySelectorAll('.year-btn, .month-btn').forEach(b => b.classList.remove('active'));
  if (month !== null) {
    document.getElementById(`mb${year}_${month}`)?.classList.add('active');
  } else {
    document.getElementById(`yr${year}`)?.classList.add('active');
  }
}

// ═══════════════════════════════════════════════════════
// FILE LOADING
// ═══════════════════════════════════════════════════════
function loadFiles(fileList) {
  const promises = [];
  for (const file of fileList) {
    const name = file.name.toUpperCase();
    if (!name.endsWith('.SEQ')) continue;

    const monthIdx = detectMonth(name);
    if (monthIdx < 0) continue;

    const year = detectYear(file.webkitRelativePath || file.name);
    if (!year) continue;

    promises.push(file.arrayBuffer().then(buf => {
      const parsed = parseSeqFile(buf);
      if (!parsed) return;
      if (!db[year]) db[year] = {};
      db[year][monthIdx] = parsed;
    }));
  }

  Promise.all(promises).then(() => {
    if (Object.keys(db).length === 0) return alert('Keine gültigen SEQ-Dateien gefunden.');
    buildSidebar();
    const firstYear = Object.keys(db).map(Number).sort((a,b)=>a-b)[0];
    showAnnual(firstYear);
    document.getElementById('locationLabel').textContent =
      `${Object.keys(db).length} Jahre, ${Object.values(db).reduce((s,y)=>s+Object.keys(y).length,0)} Monate geladen`;
  });
}

// ═══════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════
function navigate(dir) {
  if (curMonth === null) {
    // Navigate between years
    const years = Object.keys(db).map(Number).sort((a,b)=>a-b);
    const idx = years.indexOf(curYear) + dir;
    if (idx >= 0 && idx < years.length) showAnnual(years[idx]);
    return;
  }
  // Navigate between months
  let y = curYear, m = curMonth + dir;
  if (m < 0)  { y--; m = 11; }
  if (m > 11) { y++; m = 0;  }
  if (db[y]?.[m]) showMonth(y, m);
  else navigate(dir > 0 ? dir+1 : dir-1);
}

// ═══════════════════════════════════════════════════════
// CHART HELPERS
// ═══════════════════════════════════════════════════════
Chart.defaults.color = '#7a849e';
Chart.defaults.borderColor = '#2d3448';

function mkChart(id, cfg) {
  if (charts[id]) { charts[id].destroy(); delete charts[id]; }
  charts[id] = new Chart(document.getElementById(id), cfg);
}

const baseOpts = (xLabel, yLabel) => ({
  responsive: true,
  maintainAspectRatio: true,
  plugins: { legend: { labels: { boxWidth: 10, padding: 10, font: { size: 11 } } },
             tooltip: { mode: 'index', intersect: false } },
  scales: {
    x: { title: { display: !!xLabel, text: xLabel, font:{size:11} }, ticks:{font:{size:10}},
         grid: { color: '#2d3448' } },
    y: { title: { display: !!yLabel, text: yLabel, font:{size:11} }, ticks:{font:{size:10}},
         grid: { color: '#2d3448' } },
  }
});

// ═══════════════════════════════════════════════════════
// MONTHLY VIEW
// ═══════════════════════════════════════════════════════
function showMonth(year, monthIdx) {
  curYear = year; curMonth = monthIdx;
  setActive(year, monthIdx);
  const md = db[year][monthIdx];
  const s  = md.summary;
  const n  = md.days.length;
  const labels = md.days.map((_,i) => i+1);

  // Compute totals
  const totalRain = md.days.reduce((a,d) => a+d.rain, 0);
  const totalSnow = md.days.reduce((a,d) => a+d.snow, 0);
  const meanTemp  = +(md.days.reduce((a,d)=>a+(d.minTemp+d.maxTemp)/2, 0) / n).toFixed(1);
  const wc = [0,0,0,0,0,0,0,0];
  md.days.forEach(d => { for(let b=0;b<8;b++) if(d.weather&(1<<b)) wc[b]++; });

  document.getElementById('content').innerHTML = `
    <div class="view-title">
      <h2>${MONTHS_DE[monthIdx]} ${year}</h2>
      <span>${n} Tage</span>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="lbl">Maximum</div>
        <div class="val red">${s.maxTemp}°C</div>
        <div class="sub">am ${s.maxTempDay}.</div>
      </div>
      <div class="stat-card">
        <div class="lbl">Minimum</div>
        <div class="val blue">${s.minTemp}°C</div>
        <div class="sub">am ${s.minTempDay}.</div>
      </div>
      <div class="stat-card">
        <div class="lbl">Mittelwert</div>
        <div class="val">${meanTemp}°C</div>
        <div class="sub">aus Min+Max</div>
      </div>
      <div class="stat-card">
        <div class="lbl">Regen gesamt</div>
        <div class="val green">${totalRain}<span style="font-size:.85rem;font-weight:400"> mm</span></div>
        <div class="sub">max ${s.maxRain}mm am ${s.maxRainDay}.</div>
      </div>
      <div class="stat-card">
        <div class="lbl">Schnee gesamt</div>
        <div class="val snow">${totalSnow}<span style="font-size:.85rem;font-weight:400"> cm</span></div>
        <div class="sub">max ${s.maxSnow}cm am ${s.maxSnowDay}.</div>
      </div>
    </div>

    <div class="charts-grid">
      <div class="chart-card wide"><h3>Temperatur</h3>
        <canvas id="cTemp"></canvas></div>
      <div class="chart-card"><h3>Niederschlag</h3>
        <canvas id="cPrec"></canvas></div>
      <div class="chart-card"><h3>Wetterverteilung</h3>
        <canvas id="cWType"></canvas></div>
    </div>

    <div class="table-wrap"><table>
      <thead><tr>
        <th>Tag</th><th>Min °C</th><th>Max °C</th>
        <th>Wetter</th><th>Regen mm</th><th>Schnee cm</th>
      </tr></thead>
      <tbody id="tBody"></tbody>
    </table></div>
  `;

  // Temperature chart
  mkChart('cTemp', {
    type: 'line',
    data: { labels,
      datasets: [
        { label:'Min °C', data: md.days.map(d=>d.minTemp),
          borderColor:'#60a5fa', backgroundColor:'rgba(96,165,250,.15)',
          fill:'+1', tension:.35, pointRadius:2, borderWidth:2 },
        { label:'Max °C', data: md.days.map(d=>d.maxTemp),
          borderColor:'#f87171', backgroundColor:'rgba(248,113,113,.1)',
          fill:'-1', tension:.35, pointRadius:2, borderWidth:2 },
      ]},
    options: { ...baseOpts('Tag','°C'), plugins:{
      ...baseOpts().plugins,
      annotation: { annotations: {
        zeroLine: { type:'line', yMin:0, yMax:0, borderColor:'rgba(255,255,255,.15)', borderDash:[4,4] }
      }}
    }}
  });

  // Precipitation chart
  mkChart('cPrec', {
    type: 'bar',
    data: { labels,
      datasets: [
        { label:'Regen (mm)', data: md.days.map(d=>d.rain),
          backgroundColor:'rgba(52,211,153,.7)', borderColor:'#34d399', borderWidth:1 },
        { label:'Schnee (cm)', data: md.days.map(d=>d.snow),
          backgroundColor:'rgba(147,197,253,.7)', borderColor:'#93c5fd', borderWidth:1 },
      ]},
    options: { ...baseOpts('Tag','mm / cm'),
      scales: { ...baseOpts().scales, x:{stacked:false, grid:{color:'#2d3448'}, ticks:{font:{size:10}}},
                                      y:{stacked:false, grid:{color:'#2d3448'}, ticks:{font:{size:10}}} }}
  });

  // Weather type pie
  const activeTags = WEATHER.filter((_,i) => wc[i] > 0);
  mkChart('cWType', {
    type: 'doughnut',
    data: {
      labels: activeTags.map(w => w.label),
      datasets:[{ data: activeTags.map((_,i)=>wc[WEATHER.indexOf(activeTags[i])]),
        backgroundColor: activeTags.map(w=>w.color+'cc'),
        borderColor: activeTags.map(w=>w.color),
        borderWidth:1 }]
    },
    options:{ responsive:true, maintainAspectRatio:true, cutout:'55%',
      plugins:{ legend:{ position:'right', labels:{ boxWidth:10, padding:8, font:{size:10} } } }}
  });

  // Table
  const tbody = document.getElementById('tBody');
  md.days.forEach((d, i) => {
    const tags = WEATHER.filter((_,b) => d.weather & (1<<b));
    tbody.insertAdjacentHTML('beforeend', `<tr>
      <td>${i+1}</td>
      <td class="t-min">${d.minTemp}°</td>
      <td class="t-max">${d.maxTemp}°</td>
      <td><div class="w-tags">${tags.map(w=>`<span class="w-tag" style="background-color:${w.bg}33;border-color:${w.color}80;color:${w.color}">${w.icon} ${w.label}</span>`).join('')}</div></td>
      <td>${d.rain > 0 ? d.rain+' mm' : '—'}</td>
      <td>${d.snow > 0 ? d.snow+' cm' : '—'}</td>
    </tr>`);
  });
}

// ═══════════════════════════════════════════════════════
// ANNUAL VIEW
// ═══════════════════════════════════════════════════════
function showAnnual(year) {
  curYear = year; curMonth = null;
  setActive(year, null);
  const yearData = db[year];
  const months = Object.keys(yearData).map(Number).sort((a,b)=>a-b);

  // Compute per-month values
  const mLabels = months.map(m => MONTHS_SHORT[m]);
  const mMaxT   = months.map(m => yearData[m].summary.maxTemp);
  const mMinT   = months.map(m => yearData[m].summary.minTemp);
  const mMeanT  = months.map(m => {
    const d = yearData[m].days;
    return +(d.reduce((a,x)=>a+(x.minTemp+x.maxTemp)/2, 0)/d.length).toFixed(1);
  });
  const mRain   = months.map(m => yearData[m].days.reduce((a,d)=>a+d.rain,0));
  const mSnow   = months.map(m => yearData[m].days.reduce((a,d)=>a+d.snow,0));
  const mWC     = months.map(m => {
    const wc=[0,0,0,0,0,0,0,0];
    yearData[m].days.forEach(d=>{ for(let b=0;b<8;b++) if(d.weather&(1<<b)) wc[b]++; });
    return wc;
  });

  const totalRain = mRain.reduce((a,v)=>a+v,0);
  const totalSnow = mSnow.reduce((a,v)=>a+v,0);
  const yearMax = Math.max(...mMaxT);
  const yearMin = Math.min(...mMinT);
  const yearMean = +(mMeanT.reduce((a,v)=>a+v,0)/mMeanT.length).toFixed(1);

  document.getElementById('content').innerHTML = `
    <div class="view-title">
      <h2>Jahresübersicht ${year}</h2>
      <span>${months.length} Monate</span>
    </div>

    <div class="stats-row">
      <div class="stat-card"><div class="lbl">Jahreshöchst</div>
        <div class="val red">${yearMax}°C</div></div>
      <div class="stat-card"><div class="lbl">Jahrestiefst</div>
        <div class="val blue">${yearMin}°C</div></div>
      <div class="stat-card"><div class="lbl">Jahresmittel</div>
        <div class="val">${yearMean}°C</div></div>
      <div class="stat-card"><div class="lbl">Regen gesamt</div>
        <div class="val green">${totalRain}<span style="font-size:.85rem;font-weight:400"> mm</span></div></div>
      <div class="stat-card"><div class="lbl">Schnee gesamt</div>
        <div class="val snow">${totalSnow}<span style="font-size:.85rem;font-weight:400"> cm</span></div></div>
    </div>

    <div class="charts-grid">
      <div class="chart-card wide"><h3>Temperatur — Jahresverlauf</h3>
        <canvas id="aTmp"></canvas></div>
      <div class="chart-card"><h3>Niederschlag pro Monat</h3>
        <canvas id="aPrec"></canvas></div>
      <div class="chart-card"><h3>Wetter-Häufigkeit</h3>
        <canvas id="aWtype"></canvas></div>
    </div>

    <div class="table-wrap"><table>
      <thead><tr>
        <th>Monat</th><th>Min °C</th><th>Max °C</th><th>Mittel</th>
        <th>Regen mm</th><th>Schnee cm</th>
        <th>☀</th><th>⛅</th><th>☁</th><th>🌧</th><th>⛈</th><th>🌨</th><th>❄</th><th>🌫</th>
      </tr></thead>
      <tbody id="aTBody"></tbody>
    </table></div>
  `;

  // Annual temp chart
  mkChart('aTmp', {
    type:'line',
    data:{ labels: mLabels, datasets:[
      { label:'Max °C',  data:mMaxT,  borderColor:'#f87171', backgroundColor:'rgba(248,113,113,.1)',
        fill:'+1', tension:.4, pointRadius:4, borderWidth:2 },
      { label:'Min °C',  data:mMinT,  borderColor:'#60a5fa', backgroundColor:'rgba(96,165,250,.15)',
        fill:'-1', tension:.4, pointRadius:4, borderWidth:2 },
      { label:'Mittel',  data:mMeanT, borderColor:'#fbbf24', backgroundColor:'transparent',
        fill:false, tension:.4, pointRadius:3, borderWidth:2, borderDash:[5,3] },
    ]},
    options: baseOpts('Monat','°C')
  });

  // Annual precipitation chart
  mkChart('aPrec', {
    type:'bar',
    data:{ labels:mLabels, datasets:[
      { label:'Regen (mm)', data:mRain, backgroundColor:'rgba(52,211,153,.7)', borderColor:'#34d399', borderWidth:1 },
      { label:'Schnee (cm)',data:mSnow, backgroundColor:'rgba(147,197,253,.7)',borderColor:'#93c5fd', borderWidth:1 },
    ]},
    options: baseOpts('Monat','mm / cm')
  });

  // Annual weather type stacked
  const wTotals = [0,0,0,0,0,0,0,0];
  mWC.forEach(wc => wc.forEach((v,i) => wTotals[i]+=v));
  mkChart('aWtype', {
    type:'bar',
    data:{ labels:mLabels,
      datasets: WEATHER.map((w,i) => ({
        label: w.label,
        data: mWC.map(wc=>wc[i]),
        backgroundColor: w.color+'bb',
        borderColor: w.color,
        borderWidth:1
      }))
    },
    options:{
      ...baseOpts('Monat','Tage'),
      scales:{
        x:{ stacked:true, grid:{color:'#2d3448'}, ticks:{font:{size:10}} },
        y:{ stacked:true, grid:{color:'#2d3448'}, ticks:{font:{size:10}} }
      }
    }
  });

  // Annual table
  const tbody = document.getElementById('aTBody');
  months.forEach((m, idx) => {
    const wc = mWC[idx];
    tbody.insertAdjacentHTML('beforeend', `<tr>
      <td style="cursor:pointer;color:var(--accent)" onclick="showMonth(${year},${m})">${MONTHS_DE[m]}</td>
      <td class="t-min">${mMinT[idx]}°</td>
      <td class="t-max">${mMaxT[idx]}°</td>
      <td>${mMeanT[idx]}°</td>
      <td>${mRain[idx] > 0 ? mRain[idx]+' mm' : '—'}</td>
      <td>${mSnow[idx] > 0 ? mSnow[idx]+' cm' : '—'}</td>
      ${wc.map((v,i)=>`<td style="color:${WEATHER[i].color};font-weight:${v?'600':'400'}">${v||'—'}</td>`).join('')}
    </tr>`);
  });
}

// Auto-load embedded data
function autoLoadEmbedded() {
  if (!EMBEDDED_DATA || Object.keys(EMBEDDED_DATA).length === 0) return;
  const promises = [];
  for (const year in EMBEDDED_DATA) {
    for (const monthIdx in EMBEDDED_DATA[year]) {
      promises.push(
        fetch(`data:application/octet-stream;base64,${EMBEDDED_DATA[year][monthIdx]}`)
          .then(r => r.arrayBuffer())
          .then(buf => {
            const parsed = parseSeqFile(buf);
            if (!parsed) return;
            if (!db[year]) db[year] = {};
            db[year][monthIdx] = parsed;
          })
      );
    }
  }
  if (promises.length === 0) return;
  Promise.all(promises).then(() => {
    if (Object.keys(db).length === 0) return;
    buildSidebar();
    const firstYear = Object.keys(db).map(Number).sort((a,b)=>a-b)[0];
    showAnnual(firstYear);
    document.getElementById('locationLabel').textContent =
      `${Object.keys(db).length} Jahre, ${Object.values(db).reduce((s,y)=>s+Object.keys(y).length,0)} Monate bereit`;
  });
}

document.addEventListener('DOMContentLoaded', () => {
  const dz = document.getElementById('dropZone');
  const loadBtn = document.querySelector('.hdr-load');
  
  // Toggle dropZone visibility when clicking "Daten laden" button
  if (loadBtn) {
    loadBtn.addEventListener('click', (e) => {
      // Only toggle if not clicking directly on the file input
      if (e.target.tagName !== 'INPUT') {
        e.preventDefault();
        dz.classList.toggle('show');
      }
    });
  }
  
  if (dz) {
    dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
    dz.addEventListener('dragleave',() => dz.classList.remove('drag-over'));
    dz.addEventListener('drop', e => {
      e.preventDefault();
      dz.classList.remove('drag-over');
      const files = e.dataTransfer.files;
      if (files.length) loadFiles(files);
    });
  }
  
  // Auto-load embedded data on page load
  autoLoadEmbedded();
});
</script>
